version: "3.8"
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sheetdb
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/sheetdb
      - SHEET_ID=${SHEET_ID}
      - SHEET_GID=${SHEET_GID:-0}
      - SHEET_PUBLIC=${SHEET_PUBLIC:-true}
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://backend:4000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
